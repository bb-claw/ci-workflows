# ─────────────────────────────────────────────────────────────────────────────
# deploy-railway.yml
#
# Triggers a Railway service redeployment via the Railway GraphQL API.
# Finds the latest deployment for the given service + environment, then
# calls deploymentRedeploy to trigger a fresh rollout.
#
# Prerequisites:
#   - RAILWAY_TOKEN must be a Railway API token (from railway.com → Account Settings → Tokens)
#   - environment-id must match the Railway environment containing the service
#
# Inputs:
#   service-id     — Railway service ID (from Railway dashboard → service settings)
#   environment-id — Railway environment ID (required for targeting the right deployment)
#   environment    — GitHub environment name ("dev" or "production")
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy to Railway

on:
  workflow_call:
    inputs:
      service-id:
        description: "Railway service ID"
        type: string
        required: true
      project-id:
        description: "Railway project ID (unused, kept for backwards compatibility)"
        type: string
        required: false
      environment-id:
        description: "Railway environment ID — required to target the correct deployment"
        type: string
        required: false
      environment:
        description: "GitHub environment name (dev | production)"
        type: string
        required: true
    secrets:
      RAILWAY_TOKEN:
        required: true

jobs:
  deploy:
    name: Deploy → Railway (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Trigger redeployment via Railway API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PIPELINE_DEBUG: ${{ vars.PIPELINE_DEBUG || '0' }}
        run: |
          set -euo pipefail

          SERVICE_ID="${{ inputs.service-id }}"
          ENVIRONMENT_ID="${{ inputs.environment-id }}"

          if [[ "${PIPELINE_DEBUG:-0}" == "1" ]]; then
            echo "🐛 DEBUG MODE ENABLED"
            echo "  RAILWAY_TOKEN: ${RAILWAY_TOKEN:0:4}...${RAILWAY_TOKEN: -4}"
            echo "  SERVICE_ID:    $SERVICE_ID"
            echo "  ENVIRONMENT_ID: ${ENVIRONMENT_ID:-(not provided)}"
            echo "  GITHUB_ENVIRONMENT: ${{ inputs.environment }}"
            echo ""
          fi

          echo "🚀 Triggering redeployment for service: $SERVICE_ID"
          echo "   Environment: ${{ inputs.environment }} ($ENVIRONMENT_ID)"
          echo ""

          # Build deployments query — filter by environmentId if provided
          if [[ -n "$ENVIRONMENT_ID" ]]; then
            QUERY='query { deployments(first: 1, input: { serviceId: "'"$SERVICE_ID"'", environmentId: "'"$ENVIRONMENT_ID"'" }) { edges { node { id status } } } }'
          else
            QUERY='query { deployments(first: 1, input: { serviceId: "'"$SERVICE_ID"'" }) { edges { node { id status } } } }'
          fi

          # Find latest deployment
          echo "-> Find latest deployment ..."
          RESPONSE=$(curl -sf https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg q "$QUERY" '{"query": $q}')")
          echo "RESPONSE: $RESPONE"

          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.id // empty')

          if [[ -z "$DEPLOYMENT_ID" ]]; then
            echo "❌ No deployment found for service $SERVICE_ID"
            echo "   Response: $RESPONSE"
            echo ""
            echo "⚠️ POSSIBLE CAUSES:"
            echo "  - RAILWAY_TOKEN is invalid or expired (check Railway dashboard → Account → Tokens)"
            echo "  - SERVICE_ID or ENVIRONMENT_ID is wrong"
            echo "  - Service has never been deployed"
            exit 1
          fi

          echo "📦 Latest deployment: $DEPLOYMENT_ID"

          # Trigger redeploy
          echo "-> Trigger redeploy ..."
          RESULT=$(curl -sf https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg id "$DEPLOYMENT_ID" '{"query": "mutation { deploymentRedeploy(id: \($id)) { id status } }"}')")
          echo "RESULT: $RESULT"

          STATUS=$(echo "$RESULT" | jq -r '.data.deploymentRedeploy.status // empty')

          if [[ -z "$STATUS" ]]; then
            echo "❌ Redeploy failed"
            echo "   Response: $RESULT"
            exit 1
          fi

          echo "✅ Redeploy triggered — status: $STATUS"

      - name: Summary
        run: |
          {
            echo "## Railway Deployment"
            echo "| | |"
            echo "|---|---|"
            echo "| **Environment** | \`${{ inputs.environment }}\` |"
            echo "| **Service ID** | \`${{ inputs.service-id }}\` |"
            if [[ -n "${{ inputs.environment-id }}" ]]; then
              echo "| **Environment ID** | \`${{ inputs.environment-id }}\` |"
            fi
            echo "| **Status** | ✅ Redeployment triggered |"
          } >> "$GITHUB_STEP_SUMMARY"
